name: '[CI] LLM Prober'

on:
  push:
    branches:
    - main
    - production
    - staging
    tags:
    - v*.*.*
    paths:
    - '!*'
    - go.mod
    - go.sum
    - cmd/llm-prober/**
    - config/**
    - internal/config/**
    - internal/logger/**
    - internal/probe/**
    - internal/routing/**

  workflow_dispatch:

concurrency:
  # Prevent race conditions from simultaneous runs for the same commit reference.
  # Only the first run generates the image.
  # Subsequent runs will reuse the image for deployment.
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check:
    name: Check Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      tag: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.check.outputs.digest }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: |
          ghcr.io/eternisai/enchanted-proxy/llm-prober
        tags: |
          type=sha

    - name: Log in to GHCR
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check Image Digest
      id: check
      run: |
        digest="$(
          skopeo inspect \
          "docker://ghcr.io/eternisai/enchanted-proxy/llm-prober:${{ steps.meta.outputs.version }}" \
          2>/dev/null | jq -r .Digest
        )"
        echo "digest=$digest" | tee -a "$GITHUB_OUTPUT"

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: check
    if: '! needs.check.outputs.digest'
    permissions:
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.build-image.outputs.digest }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: |
          ghcr.io/eternisai/enchanted-proxy/llm-prober
        tags: |
          type=sha

    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Log in to GHCR
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build Image
      id: build-image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: .
        file: cmd/llm-prober/Dockerfile
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: true

    - name: Cosign Image
      run: cosign sign --yes "ghcr.io/eternisai/enchanted-proxy/llm-prober@${{ steps.build-image.outputs.digest }}"

  repush:
    name: Repush Image
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.digest && github.ref_type == 'tag'
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.push-image.outputs.digest }}
    steps:
    - name: Log in to GHCR
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and Push Image
      id: push-image
      run: |
        TARGET="ghcr.io/eternisai/enchanted-proxy/llm-prober:${{ github.ref_name }}"
        DIGEST="$(skopeo inspect "docker://$TARGET" 2>/dev/null | jq -r .Digest)"
        if [[ -z "$DIGEST" ]]; then
          skopeo copy \
            "docker://ghcr.io/eternisai/enchanted-proxy/llm-prober:${{ needs.check.outputs.tag }}" \
            "docker://$TARGET"
          DIGEST="$(skopeo inspect "docker://$TARGET" | jq -r .Digest)"
        fi
        test -n "$DIGEST"
        echo "digest=$DIGEST" | tee -a "$GITHUB_OUTPUT"

  deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs:
    - check
    - build
    - repush
    if: ${{ !cancelled() && (needs.build.result == 'success' || needs.repush.result == 'success' || (needs.check.outputs.digest && needs.build.result == 'skipped')) }}
    steps:
    - name: Authenticate
      run: >-
        echo "${{ secrets.DEPLOYMENT_PAT }}" | gh auth login --with-token

    - name: Get Image Meta
      id: meta
      run: |
        tag="${{ needs.check.outputs.tag }}"
        digest="${{ needs.check.outputs.digest }}"
        if [[ "${{ needs.build.result }}" == "success" ]]; then
          digest="${{ needs.build.outputs.digest }}"
        elif [[ "${{ needs.repush.result }}" == "success" ]]; then
          tag="${{ github.ref_name }}"
          digest="${{ needs.repush.outputs.digest }}"
        fi
        test -n "$tag"
        test -n "$digest"
        echo "tag=$tag" | tee -a "$GITHUB_OUTPUT"
        echo "digest=$digest" | tee -a "$GITHUB_OUTPUT"

    - name: Trigger Deployment Workflow
      run: >-
        gh workflow run
        enchanted-proxy.yaml
        --repo ${{ github.repository_owner }}/gitops-apps
        --ref main
        --field component=llm-prober
        --field actor="${{ github.actor }}"
        --field actor_id=${{ github.actor_id }}
        --field ref_type=${{ github.ref_type }}
        --field ref_name=${{ github.ref_name }}
        --field tag="${{ steps.meta.outputs.tag }}"
        --field digest="${{ steps.meta.outputs.digest }}"
