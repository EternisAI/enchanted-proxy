version: v1
name: enchanted-proxy/server
target: ghcr.io/eternisai/enchanted-proxy/server:${version}
sources:
  app: ghcr.io/eternisai/enchanted-proxy/server-base:${version}@${digest}
  supervisor: ghcr.io/eternisai/odyn:v0.5.0-eternis.7@sha256:8bf3fd039d7bd98c4c980bb5eb06c0b48913eeae665a8c3c7c1314dba062fda0
  wrapper: ghcr.io/eternisai/enclaver-wrapper-base:v0.5.0-eternis.7@sha256:4b35a0c360c6f618c1752de0cbb4250c49b2708fad97bd2165b99b2c728f3525
defaults:
  cpu_count: 2
  memory_mb: 3072
api:
  listen_port: 9900
ingress:
# TLS ingress Proxy API endpoint
- listen_port: 8180
# TLS ingress Telegram API endpoint
- listen_port: 8181
# Prometheus Node Exporter metrics API
- listen_port: 9100
# TLS ingress proxy status endpoint
- listen_port: 9101
egress:
  allow:
  # API client endpoints
  - api.telegram.org
  # App Store Server API (IAP verification)
  - api.storekit.itunes.apple.com
  - api.storekit-sandbox.itunes.apple.com
  # Stripe API
  - api.stripe.com
  # FAI crypto payments (Base RPC + CoinGecko price feed)
  - base-sepolia.drpc.org
  - base.drpc.org
  - api.coingecko.com
  # MCP API client endpoints
  - api.perplexity.ai
  - api.replicate.com
  - www.googleapis.com
  # Proxied API endpoints
  - api.kraken.com
  - api.openai.com
  - inference.tinfoil.sh
  - openrouter.ai
  - serpapi.com
  - api.exa.ai
  - cloud-api.near.ai
  - us-east-1.aws.api.temporal.io
  # Internal API endpoints
  - 7697efc6.igw.ghostagent.org
  - server-dev.zcash-payment-backend.svc
  - server-staging.zcash-payment-backend.svc
  - server.zcash-payment-backend.svc
  - zcash.eternisai.net
  # Internal deepresearch API endpoint
  - flow-dev.dr-use1.ghostagent.org
  - flow.deepr.freysa.ai
  # Self-hosted Anonymizer-4B
  - anonymizer-4b.llm.eternisai.net
  # Self-hosted Venice (GCP)
  - 34.30.193.13
  # aws-0-us-east-2.pooler.supabase.com
  - 3.13.175.194
  - 3.139.14.59
  - 13.59.95.192
  # aws-1-us-east-1.pooler.supabase.com
  - 3.227.209.82
  - 18.213.155.45
  - 18.214.78.123
  # db.zwcxttrzlaxtbyitpaip.supabase.co
  - 3.151.95.224
  # Firestore (used by deepresearch user tracking)
  - firestore.googleapis.com
  # Firebase Cloud Messaging (push notifications)
  - fcm.googleapis.com
  # Linear API (problem reports)
  - api.linear.app
  # Slack webhooks (problem report notifications)
  - hooks.slack.com
  # NATS
  - 172.17.14.64
  - 172.18.4.136
  - 172.18.3.203
  # Attestation endorsements
  - kdsintf.amd.com
  - provenance.eternis.ai
  - tuf-repo-cdn.sigstore.dev
